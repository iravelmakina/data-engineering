name: 'food_delivery_dbt'
version: '1.0.0'
config-version: 2

require-dbt-version: ">=1.10.0"

profile: 'food_delivery_dbt'

model-paths: ["models"]
test-paths: ["tests/marts"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

clean-targets:
  - "target"
  - "dbt_packages"
  - "logs"

seeds:
  +docs:
    node_color: '#cd7f32'
  food_delivery_dbt:
    +schema: raw
    +quote_columns: false

models:
  food_delivery_dbt:
    staging:
      +materialized: view
      +schema: staging
      +docs:
        node_color: 'silver'
    marts:
      +materialized: table
      +schema: marts
      +docs:
        node_color: 'gold'
