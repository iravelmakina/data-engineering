version: 2

models:
  - name: rpt_customer_30_day_avg_spend
    description: "Calculates the 30-day rolling average spend for each customer."
    columns:
      - name: customer_id
        description: "Unique platform user identifier (Cast to STRING)."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: order_date
        data_tests:
          - not_null
      - name: daily_spend_usd
        data_tests:
          - not_null
      - name: rolling_30_day_avg_spend_usd
        data_tests:
          - not_null

  - name: rpt_restaurant_daily_rank
    description: "Ranks restaurants by their daily revenue."
    columns:
      - name: restaurant_id
        description: "Unique restaurant identifier (Cast to STRING)."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_restaurants')
                field: restaurant_id
      - name: revenue_date
        data_tests:
          - not_null
      - name: daily_revenue_usd
        data_tests:
          - not_null
      - name: daily_revenue_rank
        data_tests:
          - not_null

  - name: rpt_courier_avg_delivery_time
    description: "Evaluates courier efficiency by comparing daily average delivery time to overall average."
    columns:
      - name: courier_id
        description: "Stable surrogate key for couriers (Cast to STRING)."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_couriers')
                field: courier_id
      - name: delivery_date
        data_tests:
          - not_null
      - name: total_deliveries
        data_tests:
          - not_null
      - name: avg_delivery_duration_min
        data_tests:
          - not_null
      - name: diff_from_overall_avg_min
        data_tests:
          - not_null

  - name: rpt_daily_new_customers
    description: "Tracks daily new customer sign-ups and running total of customers."
    columns:
      - name: signup_date
        data_tests:
          - unique
          - not_null
      - name: new_customers
        data_tests:
          - not_null
      - name: running_total_customers
        data_tests:
          - not_null

  - name: rpt_menu_item_sales_momentum
    description: "Analyzes daily sales momentum of menu items, including previous day's sales and growth rate."
    columns:
      - name: menu_item_id
        description: "Unique menu item identifier (Cast to STRING)."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_menu_items')
                field: menu_item_id
      - name: order_date
        data_tests:
          - not_null
      - name: daily_sales_usd
        data_tests:
          - not_null
      - name: previous_day_sales_usd
        data_tests:
          - not_null
      - name: daily_sales_growth_rate
        data_tests:
          - not_null
